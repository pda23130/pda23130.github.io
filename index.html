<script>
    let notesFound = 0;
    const totalNotes = 7;

    // Δημιουργούμε ένα audio context ΜΙΑ φορά
    let audioCtx;

    function playNote(frequency) {

        // Αν δεν υπάρχει audio context, το φτιάχνουμε
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        // Αν ο browser το έχει σταματήσει, το ξυπνάμε
        if (audioCtx.state === "suspended") {
            audioCtx.resume();
        }

        // Δημιουργούμε τον ήχο
        const oscillator = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        oscillator.frequency.value = frequency;
        oscillator.type = "sine";

        oscillator.connect(gain);
        gain.connect(audioCtx.destination);

        // Ένταση
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);

        // Σβήσιμο ήχου για να μη χτυπάει απότομα
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.7);

        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.7);
    }
